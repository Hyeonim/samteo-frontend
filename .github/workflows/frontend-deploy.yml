name: Frontend CI/CD

on:
  push:
    branches: [ "main" ] # 본인이 사용하는 메인 브랜치 이름 (master일 경우 master로 변경)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    # ⭐ 중요: 리액트 빌드할 때 백엔드 API 주소를 주입하는 단계입니다.
    # .com으로 되어 있던 부분을 현재 실제 도메인인 .org로 수정했습니다.
    - name: Vite 환경 변수 파일(.env) 생성
      run: |
        echo "VITE_API_URL=https://www.samteo.org" > .env
        echo "VITE_KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
        echo "VITE_KAKAO_MAP_KEY=${{ secrets.KAKAO_MAP_KEY }}" >> .env
        echo "VITE_KAKAO_REDIRECT_URI=https://www.samteo.org/login/oauth2/code/kakao" >> .env
        echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
        echo "VITE_GOOGLE_REDIRECT_URI=https://www.samteo.org/login/oauth2/code/google" >> .env
        echo "VITE_NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
        echo "VITE_NAVER_REDIRECT_URI=https://www.samteo.org/login/oauth2/code/naver" >> .env

    - name: GitHub Container Registry(GHCR) 로그인
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker Buildx 설정
      uses: docker/setup-buildx-action@v3

    - name: 도커 이미지 빌드 및 푸시
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ghcr.io/hyeonim/samteo-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: AWS EC2 서버에 원격 접속하여 배포 명령어 실행
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}         # 1단계에서 깃허브에 등록한 비밀키
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}    # 1단계에서 깃허브에 등록한 .pem 키
        script: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u hyeonim --password-stdin
          docker stop samteo-frontend || true
          docker rm samteo-frontend || true
          docker pull ghcr.io/hyeonim/samteo-frontend:latest
          
          # 👇 이 부분에 --network samteo-net 옵션을 확실하게 추가했습니다!
          docker run -d --name samteo-frontend -p 3000:80 --network samteo-net ghcr.io/hyeonim/samteo-frontend:latest
          
          docker image prune -f
